services:
  conver_whisper_model:
    build: 
      context: .
      dockerfile: Dockerfile-nvidia

    container_name: conver_whisper_model

    volumes:
      - ./models:/models

    entrypoint: ["bash", "convert_whisper_model_v3_german_ct_translate.sh"]
  
  whisper:
    build: 
      context: .
      dockerfile: Dockerfile-nvidia
    
    ports:
      - "${PORT}:${PORT}"

    container_name: whisper_cuda
  
    restart: always

    volumes:
      - ./models:/models

    depends_on:
      conver_whisper_model:
        condition: service_completed_successfully

    environment:
      - PYTHON_ENV=production
      - HF_TOKEN=${HF_TOKEN}
      - PORT=${PORT}
      - PYTHONUNBUFFERED=1
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE}
      - WHISPER_MODEL_SIZE_OR_PATH=/models/whisper-v3-german-ct2
      - WHISPER_MODEL_DEVICE=${WHISPER_MODEL_DEVICE}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    